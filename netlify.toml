[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

[functions.analysis]
  timeout = 60
  included_files = ["netlify/functions/analysis-handler.mjs", "lib/auth-utils.mjs", "node_modules"]

# API route redirects for clean URLs
[[redirects]]
  from = "/api/auth/signup"
  to = "/.netlify/functions/auth-signup"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/check"
  to = "/.netlify/functions/auth-check"
  status = 200

[[redirects]]
  from = "/api/auth/set-plan"
  to = "/.netlify/functions/auth-set-plan"
  status = 200

[[redirects]]
  from = "/api/auth/logout"
  to = "/.netlify/functions/auth-logout"
  status = 200

[[redirects]]
  from = "/api/auth/oauth/:provider"
  to = "/.netlify/functions/auth-oauth-start"
  status = 200

[[redirects]]
  from = "/api/auth/callback"
  to = "/.netlify/functions/auth-callback"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/send-notification"
  to = "/.netlify/functions/send-notification"
  status = 200

[[redirects]]
  from = "/api/analysis"
  to = "/.netlify/functions/analysis"
  status = 200
